<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HC Identity - HC Guides</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/guides.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const savedLang = localStorage.getItem('preferredLanguage') || 'hu';
        document.documentElement.setAttribute('data-initial-lang', savedLang);
    </script>
</head>
<body>
    <div class="lang-toggle-container">
            <div class="lang-bg"></div>
            <div class="lang-option" id="lang-en" onclick="setLanguage('en')">
                <span class="flag-icon">🇺🇸</span>
            </div>
            <div class="lang-option" id="lang-hu" onclick="setLanguage('hu')">
                <span class="flag-icon">🇭🇺</span>
            </div>
        </div>
    <div class="guide-container">
        <nav class="sidebar" id="sidebar">
            <a href="/" class="sidebar-brand">
                <img src="/assets/icon.png" alt="HC Icon">
                Guides
            </a>
            <ul>

                <li><a href="/hc-auth/" class="active">HC Auth</a></li>
                <li><a href="/hackatime/">Hackatime</a></li>
                <li><a href="/github-education/">GitHub Education</a></li>

                <li><a data-i18n="other-resources-title" href="/other-resources/">Other Resources</a></li>
            </ul>
        </nav>
        <main class="content">
            <div id="markdown-content" class="markdown-body">
                <!-- Markdown content will be rendered here -->
            </div>
        </main>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
